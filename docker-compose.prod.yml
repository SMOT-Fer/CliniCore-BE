services:
  estudio-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: estudio-api:latest
    container_name: estudio-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/readyz | grep -q '\"status\":\"ready\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
